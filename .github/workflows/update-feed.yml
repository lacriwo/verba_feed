name: Update Verba Feed

on:
  schedule:
    - cron: "0 */3 * * *"   # каждые 3 часа (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure public dir
        run: mkdir -p public

      - name: Generate patched feed
        run: python scripts/update_feed.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/394-yandex-patched.xml
          git diff --staged --quiet || git commit -m "Update patched feed"
          git push
